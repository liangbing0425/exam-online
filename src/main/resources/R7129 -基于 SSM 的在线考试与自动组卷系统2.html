<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基于 SSM 的在线考试与自动组卷系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00d4aa',
                        secondary: '#0ea5e9',
                        accent: '#f59e0b',
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
        
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-light {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #00d4aa 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 212, 170, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(14, 165, 233, 0.3);
        }
        
        .sidebar-item {
            transition: all 0.3s ease;
        }
        
        .sidebar-item:hover, .sidebar-item.active {
            background: linear-gradient(90deg, rgba(0, 212, 170, 0.2) 0%, transparent 100%);
            border-left: 3px solid #00d4aa;
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        select.input-field option {
            color: #000000;
            background: #ffffff;
        }
        
        .input-field:focus {
            border-color: #00d4aa;
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
            outline: none;
        }
        
        .stat-card {
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00d4aa, #0ea5e9);
        }
        
        .table-row {
            transition: all 0.3s ease;
        }
        
        .table-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .animate-pulse-slow {
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .progress-bar {
            background: linear-gradient(90deg, #00d4aa, #0ea5e9);
            transition: width 1s ease;
        }
        
        .page-enter {
            animation: pageEnter 0.4s ease;
        }
        
        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-overlay {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
        }
        
        .countdown-box {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0.1) 100%);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 212, 170, 0.5); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 212, 170, 0.7); }
        
        .camera-preview {
            transform: scaleX(-1);
        }
        
        .notification {
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>

    <script>
        // ==================== API配置 ====================
        const API_BASE_URL = 'http://localhost:8080';
        
        // ==================== API请求工具函数 ====================
        async function apiRequest(url, options = {}) {
            const token = localStorage.getItem('token');
            const defaultOptions = {
                headers: {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` })
                }
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}${url}`, {
                    ...defaultOptions,
                    ...options,
                    headers: {
                        ...defaultOptions.headers,
                        ...options.headers
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                return result;
            } catch (error) {
                console.error('API请求失败:', error);
                showNotification('网络请求失败: ' + error.message, 'error');
                throw error;
            }
        }
        
        // GET请求
        async function apiGet(url, params = {}) {
            const queryString = new URLSearchParams(params).toString();
            const fullUrl = queryString ? `${url}?${queryString}` : url;
            return apiRequest(fullUrl, { method: 'GET' });
        }
        
        // POST请求
        async function apiPost(url, data = {}) {
            return apiRequest(url, {
                method: 'POST',
                body: JSON.stringify(data)
            });
        }
        
        // PUT请求
        async function apiPut(url, data = {}) {
            return apiRequest(url, {
                method: 'PUT',
                body: JSON.stringify(data)
            });
        }
        
        // DELETE请求
        async function apiDelete(url) {
            return apiRequest(url, { method: 'DELETE' });
        }
        
        // ==================== API服务层 ====================
        const ApiService = {
            // 用户相关API
            user: {
                login: (data) => apiPost('/user/login', data),
                getPage: (params) => apiGet('/user/page', params),
                add: (data) => apiPost('/user', data),
                update: (data) => apiPut('/user', data),
                delete: (id) => apiDelete(`/user/${id}`),
                toggleStatus: (id) => apiPut(`/user/toggle/${id}`)
            },
            
            // 试题相关API
            question: {
                getPage: (params) => apiGet('/question/page', params),
                getById: (id) => apiGet(`/question/${id}`),
                add: (data) => apiPost('/question', data),
                update: (data) => apiPut('/question', data),
                delete: (id) => apiDelete(`/question/${id}`)
            },
            
            // 试卷相关API
            paper: {
                getPage: (params) => apiGet('/paper/page', params),
                getById: (id) => apiGet(`/paper/${id}`),
                add: (data) => apiPost('/paper', data),
                update: (data) => apiPut('/paper', data),
                delete: (id) => apiDelete(`/paper/${id}`),
                autoGenerate: (config) => apiPost('/paper/auto-generate', config),
                getQuestions: (id) => apiGet(`/paper/${id}/questions`)
            },
            
            // 考试相关API
            exam: {
                getPage: (params) => apiGet('/exam/page', params),
                getById: (id) => apiGet(`/exam/${id}`),
                add: (data) => apiPost('/exam', data),
                update: (data) => apiPut('/exam', data),
                delete: (id) => apiDelete(`/exam/${id}`),
                enter: (examId, studentId) => apiPost(`/exam/enter/${examId}?studentId=${studentId}`, {}),
                submit: (examId, studentId, answers) => apiPost(`/exam/submit/${examId}?studentId=${studentId}`, answers)
            },
            
            // 成绩相关API
            score: {
                getPage: (params) => apiGet('/score/page', params),
                getMyScores: (studentId) => apiGet(`/score/my-scores/${studentId}`),
                getStatistics: (examId) => apiGet(`/score/statistics/${examId}`),
                grade: (data) => apiPost('/score/grade', data)
            }
        };
        
        // ==================== 全局状态 ====================
        const state = {
            currentUser: null,
            currentPage: 'dashboard',
            cameraStream: null,
            examMode: false,
            switchCount: 0,

        // ==================== 模拟数据（仅保留科目和章节） ====================
        const mockData = {

        // ==================== 工具函数 ====================
        function formatDate(date) {
            const d = date || new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        function formatTime(date) {
            const d = date || new Date();
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const seconds = String(d.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }
        
        function formatDateTime(dateStr) {
            return dateStr;
        }
        
        /**
         * 根据考试时间动态判断考试状态
         * @param {Object} exam - 考试对象，包含startTime和endTime
         * @returns {string} - 'ongoing'(进行中), 'upcoming'(未开始), 'ended'(已结束)
         */
        function getExamStatus(exam) {
            if (!exam.startTime || !exam.endTime) {
                return exam.status || 'upcoming';
            }
            
            const now = new Date();
            const startTime = new Date(exam.startTime.replace(' ', 'T'));
            const endTime = new Date(exam.endTime.replace(' ', 'T'));
            
            if (now < startTime) {
                return 'upcoming';
            } else if (now >= startTime && now <= endTime) {
                return 'ongoing';
            } else {
                return 'ended';
            }
        }
        
        /**
         * 根据试卷数据动态判断试卷状态
         * @param {Object} paper - 试卷对象，包含questionCount等信息
         * @returns {string} - 'published'(已发布/可用), 'draft'(草稿/不可用)
         */
        function getPaperStatus(paper) {
            // 如果已有明确的状态字段，优先使用
            if (paper.status) {
                return paper.status;
            }
            
            // 根据题目数量判断：有题目则为已发布，否则为草稿
            if (paper.questionCount && paper.questionCount > 0) {
                return 'published';
            } else {
                return 'draft';
            }
        }
        
        function getDifficultyColor(difficulty) {
            const colors = {
                easy: 'bg-green-500/20 text-green-400',
                medium: 'bg-yellow-500/20 text-yellow-400',
                hard: 'bg-red-500/20 text-red-400'
            };
            return colors[difficulty] || colors.medium;
        }
        
        function getDifficultyText(difficulty) {
            const texts = { easy: '简单', medium: '中等', hard: '困难' };
            return texts[difficulty] || '中等';
        }
        
        function getStatusColor(status) {
            const colors = {
                active: 'bg-green-500/20 text-green-400',
                inactive: 'bg-gray-500/20 text-gray-400',
                published: 'bg-blue-500/20 text-blue-400',
                draft: 'bg-yellow-500/20 text-yellow-400',
                ongoing: 'bg-green-500/20 text-green-400',
                upcoming: 'bg-blue-500/20 text-blue-400',
                ended: 'bg-gray-500/20 text-gray-400',
                graded: 'bg-green-500/20 text-green-400',
                pending: 'bg-yellow-500/20 text-yellow-400'
            };
            return colors[status] || 'bg-gray-500/20 text-gray-400';
        }
        
        function getStatusText(status) {
            const texts = {
                active: '正常', inactive: '禁用',
                published: '已发布', draft: '草稿',
                ongoing: '进行中', upcoming: '未开始', ended: '已结束',

        function renderQuestionCards(questions) {
            if (!questions || questions.length === 0) {
                return '<div class="text-center text-gray-400 py-8">暂无试题数据</div>';
            }
            
            return questions.map(q => {
                // 处理日期和标签
                const createTime = q.createTime ? new Date(q.createTime).toLocaleDateString('zh-CN') : '-';
                const creator = q.creatorName || '未知';
                
                // 解析选项（后端存储为JSON字符串）
                let options = [];
                try {
                    if (q.options) {
                        options = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
                    }
                } catch (e) {
                    console.error('解析选项失败:', e);
                }
                
                // 解析标签（后端存储为逗号分隔的字符串）
                let tags = [];
                if (q.tags) {
                    tags = typeof q.tags === 'string' ? q.tags.split(',').map(t => t.trim()).filter(t => t) : q.tags;
                }
                
                // 处理分值
                const score = q.score ? (typeof q.score === 'object' ? q.score.toString() : q.score) : 2;
                
                return `
                    <div class="glass-card rounded-2xl p-6 hover:border-primary/30 transition-all">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-3">
                                    <span class="tag bg-primary/20 text-primary">${getQuestionTypeText(q.type)}</span>
                                    <span class="tag ${getDifficultyColor(q.difficulty)}">${getDifficultyText(q.difficulty)}</span>
                                    <span class="tag bg-secondary/20 text-secondary">${q.subject || '-'}</span>
                                    <span class="text-sm text-gray-400">|</span>
                                    <span class="text-sm text-gray-400">${q.chapter || '-'}</span>
                                    <span class="text-sm text-gray-400">|</span>
                                    <span class="text-sm text-primary font-medium">${score}分</span>
                                </div>
                                <p class="text-lg mb-4">${q.content}</p>
                                ${(q.type === 'single' || q.type === 'multiple') && options.length > 0 ? `
                                    <div class="grid grid-cols-2 gap-2 mb-4">
                                        ${options.map((opt, i) => `
                                            <div class="glass-light rounded-lg px-4 py-2 flex items-center gap-2 ${q.answer && q.answer.includes(String.fromCharCode(65 + i)) ? 'border-primary/50 bg-primary/10' : ''}">
                                                <span class="w-6 h-6 rounded-full ${q.answer && q.answer.includes(String.fromCharCode(65 + i)) ? 'bg-primary' : 'bg-white/10'} flex items-center justify-center text-xs">${String.fromCharCode(65 + i)}</span>
                                                <span>${opt}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                ` : ''}
                                ${q.type === 'judge' ? `
                                    <div class="flex gap-4 mb-4">
                                        <span class="tag ${q.answer === 'A' ? 'bg-green-500/20 text-green-400' : 'bg-white/10 text-gray-400'}"><i class="fas fa-check mr-1"></i>正确</span>
                                        <span class="tag ${q.answer === 'B' ? 'bg-red-500/20 text-red-400' : 'bg-white/10 text-gray-400'}"><i class="fas fa-times mr-1"></i>错误</span>
                                    </div>
                                ` : ''}
                                ${q.type === 'fill' || q.type === 'essay' ? `
                                    <div class="glass-light rounded-lg p-4 mb-4">
                                        <p class="text-sm text-gray-400 mb-1">参考答案：</p>
                                        <p class="text-primary">${q.answer || '-'}</p>
                                    </div>
                                ` : ''}
                                <div class="flex items-center gap-4 text-sm text-gray-400">
                                    <span><i class="fas fa-user mr-1"></i>${creator}</span>
                                    <span><i class="fas fa-calendar mr-1"></i>${createTime}</span>
                                    <div class="flex items-center gap-1">
                                        ${tags.map(tag => `<span class="tag bg-white/10 text-gray-300">${tag}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 ml-4">
                                <button onclick="editQuestion(${q.id})" class="p-2 rounded-lg hover:bg-white/10 text-primary" title="编辑">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteQuestion(${q.id})" class="p-2 rounded-lg hover:bg-white/10 text-red-400" title="删除">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function saveQuestion(e) {
            e.preventDefault();
            const form = e.target;
            const type = form.type.value;
            
            let answer = '';
            if (type === 'multiple') {
                const checked = form.querySelectorAll('input[name="answer"]:checked');
                answer = Array.from(checked).map(c => c.value).join('');
            } else if (type === 'fill' || type === 'essay') {
                answer = form.answer ? form.answer.value : '';
            } else {
                answer = form.answer ? form.answer.value : '';
            }
            
            const options = [];
            if (type === 'single' || type === 'multiple') {
                if (form.optionA && form.optionA.value) options.push(form.optionA.value);
                if (form.optionB && form.optionB.value) options.push(form.optionB.value);
                if (form.optionC && form.optionC.value) options.push(form.optionC.value);
                if (form.optionD && form.optionD.value) options.push(form.optionD.value);
            }
            
            const tagsStr = form.tags ? form.tags.value : '';
            const tagsArray = tagsStr.split(',').map(t => t.trim()).filter(t => t);
            
            const questionData = {
                type: type,
                content: form.content.value,
                options: JSON.stringify(options), // 转换为JSON字符串
                answer: answer,
                difficulty: form.difficulty.value,
                subject: form.subject.value,
                chapter: form.chapter.value,
                tags: JSON.stringify(tagsArray), // 转换为JSON数组字符串
                score: parseFloat(form.score.value) || 2,
                status: 'active',
                creatorId: state.currentUser.id,
                creatorName: state.currentUser.name
            };
            
            try {
                const result = await ApiService.question.add(questionData);
                if (result.code === 200) {
                    closeGenericModal();
                    await renderQuestions();
                    showNotification('试题添加成功！');
                } else {
                    showNotification(result.message || '添加失败', 'error');
                }
            } catch (error) {
                console.error('添加试题失败:', error);
                showNotification('添加试题失败，请重试', 'error');
            }
        }

        /**
         * 根据开始时间和结束时间自动计算考试时长
         */
        function calculateExamDuration() {
            const startTimeInput = document.getElementById('examStartTime');
            const endTimeInput = document.getElementById('examEndTime');
            const durationInput = document.getElementById('examDuration');
            
            if (startTimeInput && endTimeInput && durationInput) {
                const startTimeValue = startTimeInput.value;
                const endTimeValue = endTimeInput.value;
                
                if (startTimeValue && endTimeValue) {
                    const startTime = new Date(startTimeValue);
                    const endTime = new Date(endTimeValue);
                    
                    // 计算时间差（分钟）
                    const diffMs = endTime.getTime() - startTime.getTime();
                    const diffMinutes = Math.floor(diffMs / (1000 * 60));
                    
                    if (diffMinutes > 0) {
                        durationInput.value = diffMinutes;
                    } else {
                        durationInput.value = '';
                        showNotification('结束时间必须晚于开始时间', 'error');
                    }
                } else {
                    durationInput.value = '';
                }
            }
        }
        
        async function createExam(e) {
            e.preventDefault();
            const form = e.target;
            
            // 获取选择的试卷信息
            const paperId = form.paperId.value;
            if (!paperId) {
                showNotification('请选择试卷', 'error');
                return;
            }
            
            const paperSelect = form.paperId;
            const paperName = paperSelect.options[paperSelect.selectedIndex].text;
            
            // 提取科目信息
            const subjectMatch = paperName.match(/\(([^)]+)\)$/);
            const subject = subjectMatch ? subjectMatch[1] : '';
            
            // 验证时间
            const startTimeValue = form.startTime.value;
            const endTimeValue = form.endTime.value;
            
            if (!startTimeValue || !endTimeValue) {
                showNotification('请设置开始和结束时间', 'error');
                return;
            }
            
            // 格式化时间为后端需要的格式
            const startTime = startTimeValue.replace('T', ' ') + ':00';
            const endTime = endTimeValue.replace('T', ' ') + ':00';
            
            const examData = {
                paperId: parseInt(paperId),
                paperName: paperName.replace(/\s*\([^)]+\)$/, ''),
                subject: subject,
                startTime: startTime,
                endTime: endTime,
                duration: Math.floor((new Date(endTime) - new Date(startTime)) / (1000 * 60)),
                status: 'upcoming',
                participantCount: 0,
                submittedCount: 0,
                allowReview: form.allowReview.checked ? 1 : 0,
                randomOrder: form.randomOrder.checked ? 1 : 0,
                antiCheat: form.antiCheat.checked ? 1 : 0,
                maxSwitchTimes: 3,
                description: form.description.value || '',
                creatorId: state.currentUser.id,
                creatorName: state.currentUser.name
            };
            
            console.log('发布考试数据:', examData);
            
            try {
                const result = await ApiService.exam.add(examData);
                console.log('发布考试结果:', result);
                
                if (result.code === 200) {
                    closeGenericModal();
                    showNotification('考试发布成功！');
                    await renderExams();
                } else {
                    console.error('发布考试失败，后端返回:', result);
                    showNotification(result.message || '发布失败', 'error');
                }
            } catch (error) {
                console.error('发布考试异常:', error);
                console.error('错误详情:', error.response || error);
                
                // 尝试获取更详细的错误信息
                let errorMsg = '发布考试失败';
                if (error.response) {
                    // HTTP 错误响应
                    if (error.response.status === 400) {
                        errorMsg = '请求参数错误，请检查表单填写';
                        if (error.response.data && error.response.data.message) {
                            errorMsg += ': ' + error.response.data.message;
                        }
                    } else if (error.response.status === 500) {
                        errorMsg = '服务器内部错误';
                    }
                } else if (error.message) {
                    errorMsg += ': ' + error.message;
                }
                
                showNotification(errorMsg, 'error');
            }
        }

            const hours = Math.floor(state.remainingTime / 3600);
            const minutes = Math.floor((state.remainingTime % 3600) / 60);
            const seconds = state.remainingTime % 60;
            
            const countdownEl = document.getElementById('examCountdown');
            if (countdownEl) {
                countdownEl.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

        async function exportScores() {
            try {
                const result = await ApiService.score.getPage({ pageNum: 1, pageSize: 1000 });
                
                if (result.code === 200) {
                    const scores = result.data.records || [];
                    
                    // 生成CSV内容
                    let csvContent = '\uFEFF'; // BOM for Excel
                    csvContent += '学生姓名,学号,考试名称,客观题得分,主观题得分,总分,提交时间,状态\n';
                    
                    scores.forEach(score => {
                        const row = [
                            score.studentName || '-',
                            score.studentNo || '-',
                            score.examName || '-',
                            parseFloat(score.objectiveScore || 0).toFixed(1),
                            parseFloat(score.subjectiveScore || 0).toFixed(1),
                            parseFloat(score.totalScore || 0).toFixed(1),
                            score.submitTime ? score.submitTime.replace('T', ' ').substring(0, 19) : '-',
                            getStatusText(score.status)
                        ];
                        csvContent += row.join(',') + '\n';
                    });
                    
                    // 下载文件
                    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement('a');
                    const url = URL.createObjectURL(blob);
                    link.setAttribute('href', url);
                    link.setAttribute('download', `成绩导出_${new Date().getTime()}.csv`);
                    link.style.visibility = 'hidden';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    showNotification(`成功导出 ${scores.length} 条成绩记录！`);
                }
            } catch (error) {
                console.error('导出成绩失败:', error);
                showNotification('导出成绩失败', 'error');
            }
        }

                // 计算中位数

                    ? ((sortedScores[midIndex - 1] + sortedScores[midIndex]) / 2).toFixed(1)
                    : sortedScores[midIndex].toFixed(1);
                
                // 计算标准差
                const variance = totalScores.reduce((sum, score) => sum + Math.pow(score - avgScore, 2), 0) / totalScores.length;

                const modalContent = `

        function exportStudentScore(id, studentName, examName) {
            // 创建CSV内容
            let csvContent = '\uFEFF'; // BOM for Excel
            csvContent += '学生姓名,考试名称,客观题得分,主观题得分,总分\n';
            csvContent += `${studentName},${examName},待查询,待查询,待查询\n`;
            
            // 下载文件
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `${studentName}_${examName}_成绩.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showNotification('学生成绩导出成功！');
        }

        let testCameraStream = null;

        function startTestCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    testCameraStream = stream;
                    const video = document.getElementById('testCameraPreview');
                    video.srcObject = stream;
                    
                    document.getElementById('startTestBtn').classList.add('hidden');
                    document.getElementById('captureTestBtn').classList.remove('hidden');
                    document.getElementById('cameraStatus').textContent = '已连接';
                    document.getElementById('cameraStatus').classList.remove('text-yellow-400');
                    document.getElementById('cameraStatus').classList.add('text-green-400');
                    
                    video.onloadedmetadata = () => {
                        document.getElementById('cameraResolution').textContent = `${video.videoWidth}x${video.videoHeight}`;
                    };
                })
                .catch(err => {
                    showNotification('无法访问摄像头: ' + err.message, 'error');
                    document.getElementById('cameraStatus').textContent = '访问失败';
                    document.getElementById('cameraStatus').classList.add('text-red-400');
                });
        }
        
        function captureTestPhoto() {
            const video = document.getElementById('testCameraPreview');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/png');
            const container = document.getElementById('photoPreviewContainer');
            container.innerHTML = `<img src="${dataUrl}" class="w-full h-full object-cover">`;
            
            document.getElementById('saveTestBtn').classList.remove('hidden');
            document.getElementById('clearTestBtn').classList.remove('hidden');
            
            testPhotoCount++;
            document.getElementById('photoCount').textContent = testPhotoCount;
            
            showNotification('拍照成功！');
        }

                    video.classList.remove('hidden');

        function stopCamera() {
            if (state.cameraStream) {
                state.cameraStream.getTracks().forEach(track => track.stop());
                state.cameraStream = null;
            }

        function capturePhoto() {
            const video = document.getElementById('cameraPreview');
            const canvas = document.getElementById('photoCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/png');
            const photo = document.getElementById('capturedPhoto');
            photo.src = dataUrl;
            photo.classList.remove('hidden');
            video.classList.add('hidden');

            document.getElementById('captureBtn').classList.remove('hidden');
            document.getElementById('retakeBtn').classList.add('hidden');

        // ==================== 考试监控 ====================
        function startExamMonitor() {
            try {
                // 显示监控浮窗
                const monitorEl = document.getElementById('examMonitor');
                if (monitorEl) {
                    monitorEl.classList.remove('hidden');
                }
                
                // 开启摄像头监控（失败不影响考试）
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        state.cameraStream = stream;
                        const video = document.getElementById('monitorVideo');
                        if (video) {
                            video.srcObject = stream;
                        }
                    })
                    .catch(err => {
                        console.warn('摄像头监控启动失败:', err.message);
                        // 摄像头失败不阻止考试，只显示提示
                        showNotification('摄像头启动失败，考试将继续进行', 'error');
                    });
                
                // 切屏检测
                document.addEventListener('visibilitychange', handleVisibilityChange);
                window.addEventListener('blur', handleWindowBlur);
            } catch (error) {
                console.error('启动考试监控失败:', error);
                // 即使监控启动失败，也允许继续考试
            }
        }
        
        function stopExamMonitor() {
            try {
                const monitorEl = document.getElementById('examMonitor');
                if (monitorEl) {
                    monitorEl.classList.add('hidden');
                }
                stopCamera();
                document.removeEventListener('visibilitychange', handleVisibilityChange);
                window.removeEventListener('blur', handleWindowBlur);
            } catch (error) {
                console.error('停止考试监控失败:', error);
            }
        }
        
        function handleVisibilityChange() {
            try {
                if (document.hidden && state.examMode) {
                    state.switchCount++;
                    const switchCountEl = document.getElementById('switchCount');
                    if (switchCountEl) {
                        switchCountEl.textContent = state.switchCount;
                    }
                    showNotification('警告：请勿离开考试页面！切屏次数：' + state.switchCount, 'error');
                }
            } catch (error) {
                console.error('处理页面可见性变化失败:', error);
            }
        }
        
        function handleWindowBlur() {
            try {
                if (state.examMode) {
                    state.switchCount++;
                    const switchCountEl = document.getElementById('switchCount');
                    if (switchCountEl) {
                        switchCountEl.textContent = state.switchCount;
                    }
                }
            } catch (error) {
                console.error('处理窗口失焦失败:', error);
            }
        }
        
        // ==================== 通知功能 ====================
        function showNotifications() {
            const notifications = [
                { icon: 'fa-bell', title: '考试提醒', message: 'Java基础测试将于明天开始', time: '10分钟前', color: 'text-primary' },
                { icon: 'fa-check-circle', title: '阅卷完成', message: '数据库原理测试已完成阅卷', time: '1小时前', color: 'text-green-400' },
                { icon: 'fa-user-plus', title: '新用户注册', message: '有3名新学生完成注册', time: '2小时前', color: 'text-secondary' },
            ];
            
            document.getElementById('notificationList').innerHTML = notifications.map(n => `
                <div class="glass-light rounded-xl p-4 flex items-start gap-3">
                    <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center">
                        <i class="fas ${n.icon} ${n.color}"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium">${n.title}</p>
                        <p class="text-sm text-gray-400">${n.message}</p>
                        <p class="text-xs text-gray-500 mt-1">${n.time}</p>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('notificationModal').classList.remove('hidden');
        }
        
        function closeNotificationModal() {
            document.getElementById('notificationModal').classList.add('hidden');
        }
        
        // ==================== 通用模态框 ====================
        function closeGenericModal() {
            document.getElementById('genericModal').classList.add('hidden');
        }
        
        // ==================== 初始化 ====================
        updateTime();
        
        // 页面可见性变化处理
        document.addEventListener('visibilitychange', () => {
            if (state.examMode && document.hidden) {
                state.switchCount++;
                const switchCountEl = document.getElementById('switchCount');
                if (switchCountEl) {
                    switchCountEl.textContent = state.switchCount;
                }
            }
        });
    </script>
</body>
</html>
